<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bgHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B1E8E"/>
      <stop offset="60%" stop-color="#6D3FE0"/>
      <stop offset="100%" stop-color="#E60050"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4C89C"/>
      <stop offset="100%" stop-color="#D89A6A"/>
    </linearGradient>
    <linearGradient id="laptop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8ECF1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3">
      <stop offset="0%" stop-color="#FFD400" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bgHero)"/>
  <ellipse cx="400" cy="300" rx="500" ry="400" fill="url(#glow)"/>

  <!-- Classroom hints -->
  <rect x="60" y="120" width="140" height="200" rx="8" fill="#FFFFFF" opacity="0.08"/>
  <rect x="600" y="120" width="140" height="200" rx="8" fill="#FFFFFF" opacity="0.08"/>
  <line x1="0" y1="700" x2="800" y2="700" stroke="#FFFFFF" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="720" x2="800" y2="720" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>

  <!-- Decorative stars -->
  <g fill="#FFD400" opacity="0.85">
    <circle cx="120" cy="450" r="4"/>
    <circle cx="680" cy="380" r="5"/>
    <circle cx="140" cy="680" r="3"/>
    <circle cx="660" cy="640" r="4"/>
  </g>

  <!-- Student silhouettes bottom -->
  <g opacity="0.55">
    <circle cx="140" cy="870" r="40" fill="#1A0B3E"/>
    <rect x="100" y="905" width="80" height="95" rx="14" fill="#1A0B3E"/>
    <circle cx="660" cy="870" r="40" fill="#1A0B3E"/>
    <rect x="620" y="905" width="80" height="95" rx="14" fill="#1A0B3E"/>
    <circle cx="260" cy="905" r="36" fill="#1A0B3E"/>
    <rect x="224" y="935" width="72" height="65" rx="12" fill="#1A0B3E"/>
    <circle cx="540" cy="905" r="36" fill="#1A0B3E"/>
    <rect x="504" y="935" width="72" height="65" rx="12" fill="#1A0B3E"/>
  </g>

  <!-- Main teacher figure (simplified) -->
  <g>
    <!-- Body / vest -->
    <path d="M 340 620 Q 340 580 380 575 L 420 575 Q 460 580 460 620 L 465 830 L 335 830 Z" fill="#2A1465"/>
    <!-- Shirt collar -->
    <path d="M 380 575 L 400 610 L 420 575 Z" fill="#E8ECF1"/>
    <path d="M 340 620 L 380 620 L 400 650 L 420 620 L 460 620" stroke="#94A3B8" stroke-width="2" fill="none"/>
    <!-- Arms -->
    <rect x="300" y="600" width="48" height="140" rx="24" fill="#2A1465"/>
    <rect x="452" y="600" width="48" height="140" rx="24" fill="#2A1465"/>
    <!-- Hands -->
    <circle cx="324" cy="740" r="22" fill="url(#skin)"/>
    <circle cx="476" cy="740" r="22" fill="url(#skin)"/>
    <!-- Neck -->
    <rect x="388" y="540" width="24" height="40" fill="url(#skin)"/>
    <!-- Head -->
    <circle cx="400" cy="510" r="62" fill="url(#skin)"/>
    <!-- Hair -->
    <path d="M 340 490 Q 350 440 400 435 Q 450 440 460 490 Q 460 470 440 460 L 360 460 Q 340 470 340 490 Z" fill="#2A1465"/>
    <!-- Eyes -->
    <circle cx="380" cy="510" r="3" fill="#1A0B3E"/>
    <circle cx="420" cy="510" r="3" fill="#1A0B3E"/>
    <!-- Smile -->
    <path d="M 385 535 Q 400 548 415 535" stroke="#1A0B3E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Laptop/Chromebook -->
    <rect x="300" y="720" width="200" height="130" rx="8" fill="url(#laptop)"/>
    <rect x="310" y="730" width="180" height="110" rx="4" fill="#1E293B"/>
    <!-- Screen content -->
    <rect x="322" y="742" width="156" height="6" rx="2" fill="#22D3EE"/>
    <rect x="322" y="756" width="110" height="4" rx="2" fill="#FFFFFF" opacity="0.6"/>
    <rect x="322" y="768" width="140" height="4" rx="2" fill="#FFFFFF" opacity="0.4"/>
    <rect x="322" y="780" width="90" height="4" rx="2" fill="#FFFFFF" opacity="0.4"/>
    <!-- Chromebook logo -->
    <circle cx="482" cy="830" r="4" fill="#22D3EE"/>
    <circle cx="482" cy="830" r="4" fill="#E60050" opacity="0.6"/>
    <!-- Laptop base -->
    <rect x="290" y="848" width="220" height="8" rx="4" fill="#64748B"/>
  </g>

  <!-- Floating IA elements -->
  <g>
    <circle cx="170" cy="280" r="26" fill="#FFD400"/>
    <text x="170" y="287" text-anchor="middle" font-family="Garet, Arial, sans-serif" font-weight="800" font-size="16" fill="#1A0B3E">IA</text>
  </g>
  <g>
    <circle cx="630" cy="220" r="22" fill="#FFFFFF"/>
    <text x="630" y="227" text-anchor="middle" font-family="Garet, Arial, sans-serif" font-weight="800" font-size="14" fill="#E60050">G</text>
  </g>
  <g>
    <rect x="600" y="450" width="70" height="36" rx="18" fill="#FFFFFF" opacity="0.95"/>
    <text x="635" y="473" text-anchor="middle" font-family="Garet, Arial, sans-serif" font-weight="700" font-size="14" fill="#E60050">Gemini</text>
  </g>
</svg>
